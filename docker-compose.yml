services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: atc
      POSTGRES_PASSWORD: atc
      POSTGRES_DB: atc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atc"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://atc:atc@db:5432/atc
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
