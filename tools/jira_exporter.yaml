id: jira_exporter
name: Jira Exporter
description: >-
  Export Jira issues to Markdown, HTML, or raw JSON.
  Supports Cloud and Server/Data Center. Token credential fields: url, email,
  api_token (Cloud); url, username, password or api_token (Server).
  Optionally set jira_type and auth_type.
command: jira-export
token_type: credential_object

env:
  JIRA_URL:   [url, jira_url]

optional_env:
  JIRA_TYPE:
    from: [jira_type, type]
    omit_if: ["", cloud]
  JIRA_AUTH_TYPE:
    from: [auth_type]
    omit_if: ["", basic]
  JIRA_EMAIL:
    from: [email, jira_email]
    omit_if: [""]
  JIRA_TOKEN:
    from: [token, api_token, jira_token]
    omit_if: [""]
  JIRA_USERNAME:
    from: [username, jira_username]
    omit_if: [""]
  JIRA_PASSWORD:
    from: [password, jira_password]
    omit_if: [""]

args:
  - type: scope
    param: scope
    value_param: scope_value

  - type: flag
    flag: --format
    param: format

  - type: flag
    flag: --output
    param: output_dir
    omit_if_empty: true

  - type: boolean
    flag: --comments
    param: comments

  - type: boolean
    flag: --force
    param: force

  - type: boolean
    flag: --list
    param: list_only

  - type: boolean
    flag: --debug
    param: debug

parameters:
  - name: scope
    type: select
    label: Scope
    options: [issue, project, board, jql]
    default: ""
    placeholder: "— default —"
    required: false

  - name: scope_value
    type: text
    label: Issue Key / Project Key / Board ID / JQL
    default: ""
    placeholder: "PROJ-123  or  PROJ  or  42  or  project = PROJ AND ..."
    required: true

  - name: format
    type: select
    label: Output Format
    options: [md, html, raw]
    default: md
    required: true

  - name: output_dir
    type: text
    label: Output Directory
    default: ./export
    placeholder: ./export
    required: false

  - name: comments
    type: checkbox
    label: Include issue comments
    default: false
    required: false

  - name: force
    type: checkbox
    label: Force overwrite existing files
    default: false
    required: false

  - name: list_only
    type: checkbox
    label: Dry run (list what would be exported, no files written)
    default: false
    required: false

  - name: debug
    type: checkbox
    label: Enable verbose debug output
    default: false
    required: false
